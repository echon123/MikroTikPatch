name: Patch Mikrotik RouterOS 7.x (Custom Key Architecture)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'RouterOS Version (精确版本号)'
        required: true
        default: '7.14.3'
      arch:
        description: 'Architecture (架构)'
        required: true
        default: 'arm64'

env:
  # 官方更新服务器，用于拉取纯净原版固件
  MIKRO_UPGRADE_URL: upgrade.mikrotik.com

jobs:
  build_custom_npk:
    name: Build Patched NPK for ${{ github.event.inputs.arch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System and Python Dependencies
        run: |
          echo "::group::安装底层工具链与密码学库"
          sudo apt-get update
          # 安装用于解包 NPK 的 squashfs-tools
          sudo apt-get install -y squashfs-tools
          # 安装 Python 密码学依赖库
          python -m pip install --upgrade pip
          pip install cryptography ed25519
          echo "::endgroup::"

      - name: Download Official RouterOS NPK
        run: |
          VERSION=${{ github.event.inputs.version }}
          ARCH=${{ github.event.inputs.arch }}
          DOWNLOAD_URL="https://${{ env.MIKRO_UPGRADE_URL }}/routeros/$VERSION/routeros-$VERSION-$ARCH.npk"
          
          echo "INFO: 正在从官方数据源拉取原版固件: $DOWNLOAD_URL"
          if ! wget -nv -O official_routeros.npk "$DOWNLOAD_URL"; then
              echo "::error::[Download Failed] 无法下载官方固件，请检查版本号 $VERSION 和架构 $ARCH 是否匹配。"
              exit 1
          fi

      - name: Unpack NPK Firmware
        run: |
          echo "INFO: 正在解包官方固件..."
          if ! unsquashfs -d squashfs-root official_routeros.npk; then
              echo "::error::[Unpack Failed] Squashfs 解包失败。"
              exit 1
          fi

      - name: Inject Custom Public Key (Memory Overwrite)
        env:
          # 从 GitHub Secrets 注入你的自定义公钥
          CUSTOM_LICENSE_PUBLIC_KEY: ${{ secrets.CUSTOM_LICENSE_PUBLIC_KEY }}
        run: |
          echo "INFO: 开始执行二进制级公钥替换..."
          if [ -z "$CUSTOM_LICENSE_PUBLIC_KEY" ]; then
              echo "::error::[Config Missing] 未在 Secrets 中找到 CUSTOM_LICENSE_PUBLIC_KEY"
              exit 1
          fi
          
          # 执行仓库中的 patch.py 脚本对解压目录进行覆写
          # 注意：如果你的仓库中替换脚本不叫 patch.py，请修改此处文件名
          python3 patch.py squashfs-root/ "$CUSTOM_LICENSE_PUBLIC_KEY"

      - name: Repack and Sign with Custom Private Key
        env:
          # 从 GitHub Secrets 注入你的自定义签名私钥
          CUSTOM_NPK_SIGN_PRIVATE_KEY: ${{ secrets.CUSTOM_NPK_SIGN_PRIVATE_KEY }}
        run: |
          echo "INFO: 开始重组系统目录树并使用自定义私钥签名..."
          if [ -z "$CUSTOM_NPK_SIGN_PRIVATE_KEY" ]; then
              echo "::error::[Config Missing] 未在 Secrets 中找到 CUSTOM_NPK_SIGN_PRIVATE_KEY"
              exit 1
          fi
          
          # 此处执行打包与签名
          # 多数开源库使用类似下面的逻辑，具体取决于你 fork 的仓库是如何打包的
          # 如果仓库中有独立的 pack.py 或 make_npk.py，则调用之。
          # 假设原有的打包脚本为 pack.py：
          python3 pack.py squashfs-root/ patched_routeros-${{ github.event.inputs.version }}-${{ github.event.inputs.arch }}.npk "$CUSTOM_NPK_SIGN_PRIVATE_KEY"
          
          # (如果你的仓库是单个 patch.py 搞定解包和打包，请将上一步和这一步的代码合并)

      - name: Upload Patched Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Patched-RouterOS-${{ github.event.inputs.version }}-${{ github.event.inputs.arch }}
          path: patched_routeros-*.npk
          retention-days: 3

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: custom-${{ github.event.inputs.version }}-${{ github.event.inputs.arch }}
          name: RouterOS ${{ github.event.inputs.version }} (${{ github.event.inputs.arch }}) - Custom Key
          files: patched_routeros-*.npk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
